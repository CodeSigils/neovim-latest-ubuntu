name: Documentation consistency

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'deps/**'
      - 'Containerfile'
      - 'build.sh'
      - 'test.sh'
      - 'scripts/check-dependencies.py'
      - '.github/workflows/docs-consistency.yml'
  pull_request:
    branches: [main]
    paths:
      - 'README.md'
      - 'deps/**'
      - 'Containerfile'
      - 'build.sh'
      - 'test.sh'
      - 'scripts/check-dependencies.py'
      - '.github/workflows/docs-consistency.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Check documented dependencies
        run: python3 scripts/check-dependencies.py
