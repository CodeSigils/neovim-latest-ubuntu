name: Check Upstream Release

on:
  schedule:
    # Monday 06:30 UTC — 30 min after build cron, gives the weekly build a head start
    - cron: '30 6 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-24.04
    permissions:
      contents: write          # for branch/PR creation
      pull-requests: write     # for creating PRs
      issues: write            # fallback: filing issues
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest upstream Neovim release
        id: upstream
        run: |
          RESPONSE=$(curl -sL https://api.github.com/repos/neovim/neovim/releases/latest)
          TAG=$(echo "$RESPONSE" | jq -r '.tag_name // empty')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "error=No release data from GitHub API" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Get our latest built version
        id: ours
        run: |
          OUR_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$OUR_TAG" ]; then
            echo "version=none" >> "$GITHUB_OUTPUT"
          else
            echo "version=${OUR_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "tag=$OUR_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Compare versions
        id: compare
        run: |
          UPSTREAM="${{ steps.upstream.outputs.version }}"
          OURS="${{ steps.ours.outputs.version }}"
          echo "upstream=$UPSTREAM"
          echo "ours=$OURS"
          if [ -z "$UPSTREAM" ]; then
            echo "result=error" >> "$GITHUB_OUTPUT"
          elif [ "$UPSTREAM" != "$OURS" ]; then
            echo "result=new" >> "$GITHUB_OUTPUT"
          else
            echo "result=same" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing PR
        if: steps.compare.outputs.result == 'new'
        id: existing-pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="auto/update-v${{ steps.upstream.outputs.version }}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          PR_COUNT=$(gh pr list --head "$BRANCH" --json number --jq 'length' 2>/dev/null || echo "0")
          echo "exists=$([ "$PR_COUNT" -gt 0 ] && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

      - name: Create version update branch
        if: |
          steps.compare.outputs.result == 'new' &&
          steps.existing-pr.outputs.exists != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.upstream.outputs.version }}';
            const tag = '${{ steps.upstream.outputs.tag }}';
            const branch = '${{ steps.existing-pr.outputs.branch }}';

            const { execSync } = require('child_process');
            const run = (cmd) => { execSync(cmd, { stdio: 'inherit' }); };
            const fs = require('fs');

            run('git config user.name "github-actions[bot]"');
            run('git config user.email "github-actions[bot]@users.noreply.github.com"');
            run(`git checkout -b ${branch} origin/main`);

            // --- build.sh: update default VERSION ---
            let content = fs.readFileSync('build.sh', 'utf8');
            content = content.replace(
              /VERSION="\$\{1:-\$\{VERSION:-[\d.]+}}"/,
              `VERSION="\${1:-\${VERSION:-${version}}}"`
            );
            if (content === fs.readFileSync('build.sh', 'utf8')) {
              core.warning('build.sh: no version pattern matched');
            }
            fs.writeFileSync('build.sh', content);

            // --- test.sh: update default comment ---
            content = fs.readFileSync('test.sh', 'utf8');
            content = content.replace(
              /default: [\d.]+\)/,
              `default: ${version})`
            );
            fs.writeFileSync('test.sh', content);

            // --- README.md: update example versions ---
            content = fs.readFileSync('README.md', 'utf8');
            content = content.replace(/Build Neovim [\d.]+/g, `Build Neovim ${version}`);
            content = content.replace(/defaults to `[\d.]+`/g, "defaults to `" + version + "`");
            content = content.replace(/`0\.12\.2`/g, "`" + version + "`");
            fs.writeFileSync('README.md', content);

            // --- CHANGELOG.md: add entry under [Unreleased] > Added ---
            content = fs.readFileSync('CHANGELOG.md', 'utf8');
            const entry = `- Support for Neovim v${version}. See [upstream release](https://github.com/neovim/neovim/releases/tag/v${version}).\n- `;
            content = content.replace(
              /(## \[Unreleased\]\n\n### Added\n\n)(- )/,
              `$1${entry}`
            );
            fs.writeFileSync('CHANGELOG.md', content);

            // Commit and push
            run('git add -A');
            const commitMsg = `chore: prepare for Neovim v${version}`;
            const commitBody = `Auto-generated by the check-upstream workflow when upstream released ${tag}.`;
            run(`git commit -m "${commitMsg}" -m "${commitBody}" -m "Updates default version, CHANGELOG, and documentation references."`);
            run(`git push origin ${branch}`);

      - name: Create pull request
        if: |
          steps.compare.outputs.result == 'new' &&
          steps.existing-pr.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${{ steps.existing-pr.outputs.branch }}"
          VERSION="${{ steps.upstream.outputs.version }}"
          gh pr create \
            --title "Update default Neovim version to v${VERSION}" \
            --body "## Version bump to Neovim v${VERSION}

            This auto-generated PR updates the repository for the new Neovim release.

            ### Changes
            - Update default version in \`build.sh\` and \`test.sh\`
            - Update version examples in \`README.md\`
            - Add CHANGELOG entry for v${VERSION}

            ### After merging
            Tag and push to trigger the release workflow:

            \`\`\`bash
            git tag v${VERSION} && git push origin v${VERSION}
            \`\`\`

            > This PR was auto-generated by the \`check-upstream\` workflow." \
            --label "new-release" \
            --head "$BRANCH" \
            --base main

      - name: Create issue (fallback, PR already exists)
        if: |
          steps.compare.outputs.result == 'new' &&
          steps.existing-pr.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const upstream = '${{ steps.upstream.outputs.tag }}';
            const version = '${{ steps.upstream.outputs.version }}';

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'new-release'
            });
            const exists = issues.some(issue => issue.title.includes(upstream));
            if (exists) {
              core.notice('Issue already exists for ' + upstream + ' — skipping');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'New upstream Neovim release: ' + upstream,
              body: '## New Neovim release detected\n\n'
                + '- **Upstream**: [' + upstream + '](https://github.com/neovim/neovim/releases/tag/' + upstream + ')\n'
                + '- **Last built**: ' + ('${{ steps.ours.outputs.tag }}' || '(none yet)') + '\n\n'
                + 'A PR branch already exists, but the PR may need manual review.\n\n'
                + '### To ship\n\n'
                + '```\n# Review the auto-update PR, then:\ngit tag ' + upstream + '\ngit push origin ' + upstream + '\n```\n\n'
                + '### Or test locally\n\n```bash\nVERSION=' + version + ' ./build.sh\n```',
              labels: ['new-release']
            });
