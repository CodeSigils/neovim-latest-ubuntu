name: Build Neovim deb Package

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'docs/**'
      - '.gitattributes'
      - '.gitignore'
      - '.githooks/**'
      - '.github/dependabot.yml'
      - '.github/workflows/nightly.yml'
      - '.github/workflows/check-author.yml'
      - '.github/workflows/codeql.yml'
      - '.mailmap'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'docs/**'
      - '.gitattributes'
      - '.gitignore'
      - '.githooks/**'
      - '.github/dependabot.yml'
      - '.github/workflows/nightly.yml'
      - '.github/workflows/check-author.yml'
      - '.mailmap'
  schedule:
    - cron: '0 6 * * 1'   # Weekly: Monday 06:00 UTC — builds latest stable
  workflow_dispatch:
    inputs:
      version:
        description: 'Neovim version (e.g. 0.14.0)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UBUNTU_VERSION: ${{ vars.UBUNTU_VERSION || '26.04' }}
  UBUNTU_CODENAME: ${{ vars.UBUNTU_CODENAME || 'Resolute Raccoon' }}
  UBUNTU_SHA256: ${{ vars.UBUNTU_SHA256 || 'f3d28607ddd78734bb7f71f117f3c6706c666b8b76cbff7c9ff6e5718d46ff64' }}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ${{ vars.RUNNER_X86_64 || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Run dependency consistency check
        run: python3 scripts/check-dependencies.py
      - name: Validate workflow labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/check-labels.py
      - name: Run shellcheck
        run: shellcheck build.sh test.sh scripts/*.sh
      - name: Validate YAML workflow syntax
        run: python3 scripts/check-yaml-syntax.py
      - name: Run release readiness tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
      - name: Run hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Containerfile

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ${{ vars.RUNNER_X86_64 || 'ubuntu-latest' }}
          - arch: aarch64
            runner: ${{ vars.RUNNER_AARCH64 || 'ubuntu-24.04-arm' }}
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build container image
        run: >
          docker build -t neovim-builder
          --build-arg UBUNTU_VERSION=${{ env.UBUNTU_VERSION }}
          --build-arg UBUNTU_CODENAME="${{ env.UBUNTU_CODENAME }}"
          --build-arg UBUNTU_SHA256=${{ env.UBUNTU_SHA256 }}
          -f Containerfile .

      - name: Build Neovim .deb
        env:
          VERSION_FROM_INPUT: ${{ github.event.inputs.version || '' }}
          VERSION_FROM_REF: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        run: |
          mkdir -p output
          # Priority: workflow_dispatch input > git tag > latest (default)
          # 'latest' auto-detects the current stable Neovim via GitHub API
          # (same logic as build.sh 'latest' alias). No hardcoded version
          # means the default is always current — no version drift.
          if [ -n "$VERSION_FROM_INPUT" ]; then
            VERSION="$VERSION_FROM_INPUT"
          elif [ -n "$VERSION_FROM_REF" ]; then
            VERSION="${VERSION_FROM_REF#v}"
            VERSION="${VERSION%%-*}"  # Strip package revision suffix (e.g. 0.12.3-1 → 0.12.3)
          else
            VERSION="latest"
          fi
          echo "Building Neovim v${VERSION} for ${{ matrix.arch }}"
          docker run --rm \
            -e VERSION="$VERSION" \
            -v "$PWD/output:/output" \
            neovim-builder

      - name: Verify artifact exists
        run: |
          if ! ls output/*.deb >/dev/null 2>&1; then
            echo "Error: No .deb package found in output/" >&2
            ls -la output/
            exit 1
          fi
          ls -lh output/

      - name: Generate SHA256 checksums
        run: |
          cd output
          sha256sum *.deb > SHA256SUMS
          cat SHA256SUMS

      - name: Test .deb package
        run: |
          DEB_NAME=$(basename "$(ls output/*.deb | head -1)")
          echo "Testing: output/$DEB_NAME"
          # Run test.sh inside the build container: the .deb's runtime
          # deps (auto-generated by dpkg-shlibdeps) reference libraries
          # from the build environment, which may differ from the runner's.
          # The runner OS and container OS may differ (the runner is
          # ${{ matrix.runner }} while the container targets
          # $UBUNTU_VERSION) — running the test in the container avoids
          # dependency version skew.
          docker run --rm \
            -v "$PWD/test.sh:/tmp/test.sh:ro" \
            -v "$PWD/output:/output:ro" \
            neovim-builder \
            bash /tmp/test.sh "/output/$DEB_NAME"

      - name: Run lintian package-policy audit
        run: |
          set +e
          docker run --rm \
            -v "$PWD/output:/output:ro" \
            neovim-builder \
            bash -c '
              if ! command -v lintian >/dev/null 2>&1; then
                echo "lintian is missing from the target container." >&2
                exit 1
              fi
              for deb in /output/*.deb; do
                echo "Running non-blocking lintian audit inside target container: $deb"
                lintian "$deb"
                lintian_status=$?
                if [ "$lintian_status" -ne 0 ]; then
                  echo "lintian reported package-policy findings for $deb (exit $lintian_status); continuing because this is an advisory audit for a CPack convenience package."
                fi
              done
            '
          lintian_container_status=$?
          if [ "$lintian_container_status" -ne 0 ]; then
            echo "lintian container audit exited $lintian_container_status; continuing because this audit is advisory."
          fi
          set -e

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: nvim-linux-deb-${{ matrix.arch }}
          path: |
            output/*.deb
            output/SHA256SUMS

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && !cancelled()
    runs-on: ${{ vars.RUNNER_X86_64 || 'ubuntu-latest' }}
    permissions:
      contents: write        # for softprops/action-gh-release
      id-token: write         # for actions/attest (OIDC → Sigstore)
      attestations: write     # for actions/attest (store attestations)
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: nvim-linux-deb-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh

      - name: Determine upstream tag for release notes link
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          # Strip package revision suffix (e.g. v0.12.2-1 → v0.12.2)
          UPSTREAM_TAG="${TAG%%-*}"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"

      - name: Regenerate combined SHA256SUMS
        run: |
          sha256sum *.deb > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-path: '*.deb'

      - name: Create Release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          body: |
            Neovim ${{ github.ref_name }} packaged as a `.deb` for Ubuntu ${{ env.UBUNTU_VERSION }} LTS (${{ env.UBUNTU_CODENAME }})-based systems.

            **Install:**

            ```
            sudo dpkg -i nvim-linux-<arch>.deb
            nvim --version
            ```

            **Verify integrity:**

            ```
            sha256sum -c SHA256SUMS
            ```

            **Upstream resources:**
            - [Release notes](https://github.com/neovim/neovim/releases/tag/${{ steps.version.outputs.upstream_tag }}) (upstream changes for this version)
            - [News](https://neovim.io/doc/user/news.html) (`:help news` in Nvim)

            **Assets:** nvim-linux-x86_64.deb, nvim-linux-arm64.deb, SHA256SUMS
          files: |
            *.deb
            SHA256SUMS
