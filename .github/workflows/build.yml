name: Build Neovim deb Package

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - 'docs/**'
  schedule:
    - cron: '0 6 * * 1'   # Weekly: Monday 06:00 UTC — builds latest stable
  workflow_dispatch:
    inputs:
      version:
        description: 'Neovim version (e.g. 0.14.0)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION_SCHEDULE: ${{ github.event_name == 'schedule' && 'latest' || '' }}
  UBUNTU_VERSION: ${{ vars.UBUNTU_VERSION || '26.04' }}
  UBUNTU_CODENAME: ${{ vars.UBUNTU_CODENAME || 'Resolute Raccoon' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run dependency consistency check
        run: python3 scripts/check-dependencies.py
      - name: Run shellcheck
        run: shellcheck build.sh test.sh
      - name: Validate YAML workflow syntax
        run: python3 scripts/check-yaml-syntax.py
      - name: Run release readiness tests
        run: python3 tests/test_release_readiness.py
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Containerfile

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Build container image
        run: >
          docker build -t neovim-builder
          --build-arg UBUNTU_VERSION=${{ env.UBUNTU_VERSION }}
          --build-arg UBUNTU_CODENAME="${{ env.UBUNTU_CODENAME }}"
          -f Containerfile .

      - name: Build Neovim .deb
        env:
          VERSION_FROM_INPUT: ${{ github.event.inputs.version || '' }}
          VERSION_FROM_REF: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        run: |
          mkdir -p output
          # Priority: workflow_dispatch input > schedule (latest) > git tag > default
          if [ -n "$VERSION_FROM_INPUT" ]; then
            VERSION="$VERSION_FROM_INPUT"
          elif [ -n "$VERSION_SCHEDULE" ]; then
            VERSION="latest"
          elif [ -n "$VERSION_FROM_REF" ]; then
            VERSION="${VERSION_FROM_REF#v}"
            VERSION="${VERSION%%-*}"  # Strip package revision suffix (e.g. 0.12.2-1 → 0.12.2)
          else
            VERSION="0.12.2"
          fi
          echo "Building Neovim v${VERSION} for ${{ matrix.arch }}"
          docker run --rm \
            -e VERSION="$VERSION" \
            -v "$PWD/output:/output" \
            neovim-builder

      - name: Verify artifact exists
        run: |
          if ! ls output/*.deb >/dev/null 2>&1; then
            echo "Error: No .deb package found in output/" >&2
            ls -la output/
            exit 1
          fi
          ls -lh output/

      - name: Generate SHA256 checksums
        run: |
          cd output
          sha256sum *.deb > SHA256SUMS
          cat SHA256SUMS

      - name: Test .deb package
        run: |
          DEB_NAME=$(basename "$(ls output/*.deb | head -1)")
          echo "Testing: output/$DEB_NAME"
          # Run test.sh inside the build container: the .deb's runtime
          # deps (auto-generated by dpkg-shlibdeps) reference libraries
          # from the build environment, which may differ from the runner's.
          # ubuntu-latest currently maps to ubuntu-24.04 while the
          # container targets $UBUNTU_VERSION — running the test in the
          # container avoids dependency version skew.
          docker run --rm \
            -v "$PWD/test.sh:/tmp/test.sh:ro" \
            -v "$PWD/output:/output:ro" \
            neovim-builder \
            bash /tmp/test.sh "/output/$DEB_NAME"

      - name: Run lintian package-policy audit
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lintian
          DEB=$(ls output/*.deb | head -1)
          echo "Running non-blocking lintian audit: $DEB"
          set +e
          lintian "$DEB"
          lintian_status=$?
          set -e
          if [ "$lintian_status" -ne 0 ]; then
            echo "lintian reported package-policy findings (exit $lintian_status); continuing because this is an advisory audit for a CPack convenience package."
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nvim-linux-deb-${{ matrix.arch }}
          path: |
            output/*.deb
            output/SHA256SUMS

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write        # for softprops/action-gh-release
      id-token: write         # for actions/attest (OIDC → Sigstore)
      attestations: write     # for actions/attest (store attestations)
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: nvim-linux-deb-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh

      - name: Determine upstream tag for release notes link
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          # Strip package revision suffix (e.g. v0.12.2-1 → v0.12.2)
          UPSTREAM_TAG="${TAG%%-*}"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"

      - name: Regenerate combined SHA256SUMS
        run: |
          sha256sum *.deb > SHA256SUMS
          cat SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: '*.deb'

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body: |
            Neovim ${{ github.ref_name }} packaged as a `.deb` for Ubuntu ${{ env.UBUNTU_VERSION }} LTS (${{ env.UBUNTU_CODENAME }})-based systems.

            **Install:**

            ```
            sudo dpkg -i nvim-linux-<arch>.deb
            nvim --version
            ```

            **Verify integrity:**

            ```
            sha256sum -c SHA256SUMS
            ```

            **Upstream resources:**
            - [Release notes](https://github.com/neovim/neovim/releases/tag/${{ steps.version.outputs.upstream_tag }}) (upstream changes for this version)
            - [News](https://neovim.io/doc/user/news.html) (`:help news` in Nvim)

            **Assets:** nvim-linux-x86_64.deb, nvim-linux-arm64.deb, SHA256SUMS
          files: |
            *.deb
            SHA256SUMS
