name: Build Neovim deb Package

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Neovim version (e.g. 0.14.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t neovim-builder -f Containerfile .

      - name: Build Neovim .deb
        env:
          VERSION_FROM_INPUT: ${{ github.event.inputs.version || '' }}
          VERSION_FROM_REF: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        run: |
          mkdir -p output
          # Priority: workflow_dispatch input > git tag > default
          if [ -n "$VERSION_FROM_INPUT" ]; then
            VERSION="$VERSION_FROM_INPUT"
          elif [ -n "$VERSION_FROM_REF" ]; then
            VERSION="${VERSION_FROM_REF#v}"
          else
            VERSION="0.12.2"
          fi
          echo "Building Neovim v${VERSION}"
          docker run --rm \
            -e VERSION="$VERSION" \
            -v "$PWD/output:/output" \
            neovim-builder

      - name: Verify artifact exists
        run: |
          if ! ls output/*.deb >/dev/null 2>&1; then
            echo "Error: No .deb package found in output/" >&2
            ls -la output/
            exit 1
          fi
          ls -lh output/

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvim-linux-deb
          path: output/*.deb

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.deb
