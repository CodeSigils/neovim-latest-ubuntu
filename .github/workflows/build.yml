name: Build Neovim deb Package

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Neovim version (e.g. 0.14.0)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t neovim-builder -f Containerfile .

      - name: Build Neovim .deb
        run: |
          mkdir -p output
          VERSION="${{ github.event.inputs.version }}"
          docker run --rm \
            -e VERSION="${VERSION:-0.12.2}" \
            -v "$PWD/output:/output" \
            neovim-builder

      - name: Verify artifact exists
        run: |
          if ! find output -name '*.deb' -exit 0 >/dev/null 2>&1; then
            echo "Error: No .deb package found in output/" >&2
            ls -la output/
            exit 1
          fi
          ls -lh output/

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvim-linux-deb
          path: output/*.deb

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.deb
