name: Build Neovim deb Package

on:
  push:
    tags: ['v*']
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'   # Weekly: Monday 06:00 UTC — builds latest stable
  workflow_dispatch:
    inputs:
      version:
        description: 'Neovim version (e.g. 0.14.0)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION_SCHEDULE: ${{ github.event_name == 'schedule' && 'latest' || '' }}

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: shellcheck build.sh test.sh
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Containerfile

  build:
    needs: lint
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    # ARM builds are additive — don't block releases or status checks if flaky
    continue-on-error: ${{ matrix.arch == 'aarch64' }}
    steps:
      - uses: actions/checkout@v6

      - name: Build container image
        run: docker build -t neovim-builder -f Containerfile .

      - name: Build Neovim .deb
        env:
          VERSION_FROM_INPUT: ${{ github.event.inputs.version || '' }}
          VERSION_FROM_REF: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
        run: |
          mkdir -p output
          # Priority: workflow_dispatch input > schedule (latest) > git tag > default
          if [ -n "$VERSION_FROM_INPUT" ]; then
            VERSION="$VERSION_FROM_INPUT"
          elif [ -n "$VERSION_SCHEDULE" ]; then
            VERSION="latest"
          elif [ -n "$VERSION_FROM_REF" ]; then
            VERSION="${VERSION_FROM_REF#v}"
          else
            VERSION="0.12.2"
          fi
          echo "Building Neovim v${VERSION} for ${{ matrix.arch }}"
          docker run --rm \
            -e VERSION="$VERSION" \
            -v "$PWD/output:/output" \
            neovim-builder

      - name: Verify artifact exists
        run: |
          if ! ls output/*.deb >/dev/null 2>&1; then
            echo "Error: No .deb package found in output/" >&2
            ls -la output/
            exit 1
          fi
          ls -lh output/

      - name: Generate SHA256 checksums
        run: |
          cd output
          sha256sum *.deb > SHA256SUMS
          cat SHA256SUMS

      - name: Test .deb package
        run: |
          DEB=$(ls output/*.deb | head -1)
          echo "Testing: $DEB"
          ./test.sh "$DEB"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nvim-linux-deb-${{ matrix.arch }}
          path: |
            output/*.deb
            output/SHA256SUMS

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && !cancelled()
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: nvim-linux-deb-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh

      - name: Regenerate combined SHA256SUMS
        run: |
          sha256sum *.deb > SHA256SUMS
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.deb
            SHA256SUMS
