name: Nightly Build

on:
  schedule:
    - cron: '0 6 * * *'   # Daily: 06:00 UTC (same time as weekly stable build)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: shellcheck build.sh test.sh
      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Containerfile

  build:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Build container image
        run: docker build -t neovim-builder -f Containerfile .

      - name: Build nightly Neovim
        run: |
          mkdir -p output
          docker run --rm \
            -e VERSION=nightly \
            -v "$PWD/output:/output" \
            neovim-builder

      - name: Verify artifact exists
        run: |
          if ! ls output/*.deb >/dev/null 2>&1; then
            echo "Error: No .deb package found in output/" >&2
            ls -la output/
            exit 1
          fi
          ls -lh output/

      - name: Generate SHA256 checksums
        run: |
          cd output
          sha256sum *.deb > SHA256SUMS
          cat SHA256SUMS

      - name: Test .deb package
        run: |
          DEB_NAME=$(basename "$(ls output/*.deb | head -1)")
          echo "Testing: output/$DEB_NAME"
          # Run test.sh inside the build container: the .deb's runtime
          # deps (auto-generated by dpkg-shlibdeps) reference libraries
          # from the build environment, which may differ from the runner's.
          # ubuntu-latest currently maps to ubuntu-26.04 (glibc 2.43) while ARM runners
          # are still on ubuntu-24.04 (glibc 2.39) — running the test in the container
          docker run --rm \
            -v "$PWD/test.sh:/tmp/test.sh:ro" \
            -v "$PWD/output:/output:ro" \
            neovim-builder \
            bash /tmp/test.sh "/output/$DEB_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nvim-nightly-deb-${{ matrix.arch }}
          path: |
            output/*.deb
            output/SHA256SUMS
          retention-days: 30

  report-failure:
    needs: build
    if: ${{ failure() && github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Check for existing nightly failure issue
        id: check_issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh issue list \
            --repo ${{ github.repository }} \
            --label nightly \
            --state open \
            --json number \
            --jq 'length' 2>/dev/null || echo "0")
          echo "count=$EXISTING" >> "$GITHUB_OUTPUT"
          echo "Existing open nightly issues: $EXISTING"

      - name: Create failure issue
        if: steps.check_issue.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue create \
            --repo ${{ github.repository }} \
            --title "Nightly build failed — $(date +%Y-%m-%d)" \
            --label nightly \
            --body "The nightly build from Neovim \`master\` failed on $(date +%Y-%m-%d).

          **Run**: $RUN_URL
          **Event**: ${{ github.event_name }}
          **Branch**: ${{ github.ref_name }}

          Check the workflow run for details on which architecture(s) failed and why."

  report-success:
    needs: build
    if: ${{ success() && github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Check for and close nightly failure issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE=$(gh issue list \
            --repo ${{ github.repository }} \
            --label nightly \
            --state open \
            --json number \
            --jq '.[0].number // empty' 2>/dev/null)
          if [ -n "$ISSUE" ]; then
            echo "Closing nightly failure issue #$ISSUE — build has recovered"
            gh issue comment "$ISSUE" \
              --repo ${{ github.repository }} \
              --body "Nightly build has been passing again since $(date +%Y-%m-%d). Closing."
            gh issue close "$ISSUE" \
              --repo ${{ github.repository }}
          else
            echo "No open nightly failure issues — all clear"
          fi
